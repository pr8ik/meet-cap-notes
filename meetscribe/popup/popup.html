<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <link rel="stylesheet" href="../design-system.css">
  <link rel="stylesheet" href="popup.css">
  <title>MeetScribe</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="wordmark">
        <img src="../assets/logo.png" class="wordmark-mark" alt="MeetScribe">
        <span class="wordmark-text">MeetScribe</span>
      </div>
      <button class="btn-icon" id="settings-btn" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Status -->
    <div class="status" id="status-idle">
      <div class="status-indicator idle"></div>
      <span class="status-label">Idle</span>
    </div>
    <div class="status status-rec hidden" id="status-recording">
      <div class="status-indicator recording"></div>
      <div class="status-info">
        <span class="status-label">Recording</span>
        <span class="status-detail" id="current-title"></span>
      </div>
      <button class="btn btn-sm btn-danger" id="stop-btn">Stop</button>
    </div>

    <div class="divider"></div>

    <!-- Latest -->
    <section class="section">
      <h2 class="section-label">Latest</h2>
      <div id="latest-meeting" class="card card-empty">
        <p class="empty-msg">No transcripts yet</p>
      </div>
    </section>

    <!-- Previous -->
    <section class="section">
      <h2 class="section-label">Previous</h2>
      <div id="meetings-list" class="meeting-list">
        <p class="empty-msg">No previous meetings</p>
      </div>
    </section>

    <div class="divider"></div>

    <footer class="footer">
      <button class="btn btn-ghost btn-sm" id="dashboard-btn">View all meetings</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
